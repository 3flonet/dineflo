name: Dineflo CI/CD - Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  laravel-tests:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    # Dihapus: Setup PHP & Node.js (Sudah ada di Laragon)
    # Ini juga menghindari error 'pwsh not found' pada Windows

    - name: Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Install NPM Dependencies & Build
      run: |
        npm install
        npm run build

    - name: Prepare Environment
      shell: powershell
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: dineflo_test
        DB_USERNAME: root
        DB_PASSWORD: ""
      run: |
        if (-not (Test-Path .env.testing)) {
            Copy-Item .env.example .env.testing
        }
        php artisan key:generate --env=testing
        php artisan migrate:fresh --env=testing --force
        php artisan db:seed --env=testing --force

    - name: Run Tests
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: dineflo_test
        DB_USERNAME: root
        DB_PASSWORD: ""
      run: php artisan test
